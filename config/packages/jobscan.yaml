parameters:
    app.filter_keywords:
        - php
        - symfony
        - wordpress
        - backend
        - fullstack
        - api

    app.known_stack:
        - php
        - symfony
        - wordpress
        - mysql
        - postgresql
        - redis
        - docker
        - react
        - vue
        - api
        - rabbitmq
        - laravel
        - typescript
        - javascript

    app.searx_queries:
        - 'php symfony remote job'
        - 'php symfony freelance remote'
        - 'wordpress php remote developer'
        - 'backend php api remote job'
        - 'développeur php symfony full remote'
        - 'développeur php WordPress'
        - 'mission freelance php symfony remote'

    app.job_locations:
        - 'Marseille'
        - 'Paris'
        - 'Aix-en-Provence'
        - 'Ile-de-France'
        - 'Bouches-du-Rhône'
        - "Provence-Alpes-Côte d'Azur"
        - 'Remote'

    app.scoring:
        prescore:
            keywords:
                php: 10
                symfony: 15
                wordpress: 10
            remote_keywords:
                - remote
                - télétravail
                - teletravail
            remote_bonus: 5
            negative_keywords:
                stage: -50
                alternance: -50
        compute:
            title_keywords:
                php: 20
            stack_keywords:
                symfony: 30
                wordpress: 20
            contract_bonuses:
                freelance: 15
                cdi: 10
            flag_bonuses:
                remote: 10
                recent: 20
            description_keywords:
                mission: 10
                urgent: 15
                asap: 15
            negative_keywords:
                stage: -50
                alternance: -50

    app.ai_system_prompt: |
        Tu es un extracteur de données d'offres d'emploi.

        Tu dois répondre STRICTEMENT avec un JSON valide.
        Aucun texte avant.
        Aucun texte après.
        Aucun markdown.
        Aucun bloc ```json.

        Format EXACT :

        {
          "stack": ["php", "symfony", "wordpress"],
          "contract_type": "freelance|cdi|unknown",
          "freelance": true,
          "remote": true,
          "budget": "500€/j ou 45k€/an ou non précisé",
          "recent": true,
          "seniority": "junior|mid|senior|unknown"
        }

        Règles strictes :

        - "freelance" = true UNIQUEMENT si freelance, mission, TJM, contract explicite
        - "contract_type" = "cdi" UNIQUEMENT si CDI explicitement mentionné
        - "remote" = true si remote ou télétravail mentionné
        - "budget" :
          - convertir $ en € approximatif
          - exemple: $80,000 → 80k€/an
          - plage: 80k-110k€/an
        - "seniority" :
          - senior si 3+ ans ou autonomie demandée
        - "stack" :
          - uniquement technologies explicitement présentes

        Si doute → "unknown"

        Réponds UNIQUEMENT avec le JSON.
